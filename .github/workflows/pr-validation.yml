name: PR Validation Gate

on:
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validation Gate for PR Merge

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Validate target branch
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          echo "PR target branch: $TARGET_BRANCH"
          if [ "$TARGET_BRANCH" != "main" ] && [ "$TARGET_BRANCH" != "dev" ]; then
            echo "Error: PRs must target main or dev branch"
            exit 1
          fi

      - name: Check for merge conflicts
        run: |
          echo "Checking for merge conflict markers..."
          if grep -r "^<<<<<<< HEAD" . --include="*.py" --include="*.md"; then
            echo "Error: Merge conflict markers found"
            exit 1
          fi

      - name: Run core tests
        run: |
          echo "Running core unit tests..."
          pytest tests/ -v --tb=short

      - name: Run lint checks
        continue-on-error: true
        run: |
          echo "Running code quality checks..."
          flake8 src/ config.py main.py --max-line-length=100 --count

      - name: Verify required files
        run: |
          echo "Verifying required project files..."
          FILES=("config.py" "main.py" "README.md" "requirements.txt")
          for file in "${FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Error: Missing required file $file"
              exit 1
            fi
          done

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const status = context.job.status;
            const body = `Validation Results:
            - Python version: 3.11
            - Tests: ${{ job.status }}
            - Status: ${status}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
