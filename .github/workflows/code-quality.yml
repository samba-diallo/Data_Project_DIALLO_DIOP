name: Code Quality Check

on:
  push:
    branches: [dev, dev1, dev2, main]
  pull_request:
    branches: [dev, dev1, dev2, main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint

      - name: Flake8 code quality check
        continue-on-error: true
        run: |
          echo "Running flake8 style guide enforcement..."
          flake8 src/ config.py main.py --max-line-length=100 --count --statistics

      - name: Pylint code analysis
        continue-on-error: true
        run: |
          echo "Running pylint code analysis..."
          pylint src/ config.py main.py --disable=all --enable=E,F --fail-under=9.0 || true

      - name: Python syntax check
        run: |
          echo "Checking Python syntax..."
          python -m py_compile src/*.py config.py main.py || true
